name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '27.1'
          - '27.2'
          - '28.2'
          - '29.4'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}
      - name: Compile
        run: make compile
      - name: Run tests
        run: make test

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package Version header
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          version=$(awk -F': ' '/^;; Version:/ { print $2; exit }' countdown-modeline.el)
          if [ "$tag" != "$version" ]; then
            echo "Tag v$tag does not match 'Version: $version' in countdown-modeline.el"
            exit 1
          fi

      - name: Extract release notes for this version from CHANGELOG.md
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          awk -v tag="$tag" '
            $0 ~ "^## \\[" tag "\\]"     { inside=1; next }
            inside && /^## /             { exit }
            inside && /^\[[^]]+\]:[ \t]/ { exit }
            inside                       { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG entry found for version $tag"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          draft: true
          files: countdown-modeline.el
